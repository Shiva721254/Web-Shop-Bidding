services:
    nginx:
        image: nginx:latest
        ports:
            - "80:80"
        volumes:
            - ./nginx.conf:/etc/nginx/nginx.conf
            - ./app:/app
    php:
        build:
            context: .
            dockerfile: PHP.Dockerfile
        volumes:
            - ./app:/app
        environment:
            # Set this to your production frontend URL when deploying
            # Example: ALLOWED_ORIGIN=https://your-app.railway.app
            ALLOWED_ORIGIN: ''
    mysql:
        image: mariadb:latest
        environment:
            MYSQL_ROOT_PASSWORD: 'secret123'
            MYSQL_USER: 'developer'
            MYSQL_PASSWORD: 'secret123'
            MYSQL_DATABASE: 'developmentdb'
        volumes:
            - mysqldata:/var/lib/mysql
            - ./app/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
            - ./app/database/seeds.sql:/docker-entrypoint-initdb.d/02-seeds.sql
        ports:
            - 3306:3306
    phpmyadmin:
        image: phpmyadmin:latest
        ports:
            - 8080:80
        environment:
            - PMA_HOST=mysql
volumes:
    mysqldata: {}
